receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}
  metricstransform/labels:
    transforms:
      - include: "^blog\\..*"
        match_type: regexp
        action: update
        operations:
          - action: update_label
            label: queue
            new_label: destination

exporters:
  prometheus:
    endpoint: 0.0.0.0:9464
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch, metricstransform/labels]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
